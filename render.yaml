services:
  - type: web
    name: blue-horizon-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run deploy:start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: blue-horizon-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: DOTBLUE_MODEL
        value: openai/gpt-4o-mini
      - key: DOTBLUE_BASE_URL
        value: https://ai.psu.blue/v1

  - type: web
    name: blue-horizon-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: blue-horizon-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: blue-horizon-db
    plan: free
    region: singapore
    databaseName: bluehorizon
    user: bluehorizon
    postgresMajorVersion: "16"
