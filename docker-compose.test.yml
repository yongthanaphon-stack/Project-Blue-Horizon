name: bluehorizondraft001-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: bluehorizon-db-test
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bluehorizon
      POSTGRES_PASSWORD: bluehorizon_secret
      POSTGRES_DB: bluehorizon
    volumes:
      - pgdata-test:/var/lib/postgresql/data

volumes:
  pgdata-test:
