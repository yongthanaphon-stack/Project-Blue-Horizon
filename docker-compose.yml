name: bluehorizondraft001

services:
  postgres:
    image: postgres:16-alpine
    container_name: bluehorizon-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bluehorizon
      POSTGRES_PASSWORD: bluehorizon_secret
      POSTGRES_DB: bluehorizon
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
